<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <title>Happy Birthday, Powei! 🎂</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #010409;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 32px 16px 48px;
    }

    #birthday-card {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 0;
      width: 100%;
      max-width: 520px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 13px;
      color: #e6edf3;
      line-height: 1.8;
    }

    @media (max-width: 480px) {
      body { padding: 0; min-height: 100vh; justify-content: flex-start; }
      #birthday-card {
        border-radius: 0;
        border-left: none;
        border-right: none;
        max-width: 100%;
        font-size: 12px;
      }
      .window-chrome { padding: 10px 14px; border-radius: 0; }
      .card-content { padding: 14px; }
      .status-bar { border-radius: 0; font-size: 10px; }
      .tool-header { font-size: 10px; }
      .tool-body { font-size: 11px; }
      .header-box { font-size: 10px; overflow-x: auto; }
      .icon-row img { width: 64px !important; height: 64px !important; }
      #save-btn { font-size: 12px; padding: 10px 20px; }
    }

    .green  { color: #3fb950; }
    .blue   { color: #58a6ff; }
    .gold   { color: #ffd700; }
    .muted  { color: #8b949e; }
    .red    { color: #ff7b72; }

    .header-box {
      color: #58a6ff;
      margin-bottom: 16px;
      white-space: pre;
    }

    .prompt-line { margin: 8px 0; }
    .prompt-line::before { content: '❯ '; color: #3fb950; }

    .check-line { margin: 2px 0; }
    .check-line::before { content: '✓ '; color: #3fb950; }

    .indent { margin-left: 20px; }

    .icon-row {
      text-align: center;
      font-size: 36px;
      margin: 16px 0;
    }

    .tag {
      display: inline-block;
      background: #1a4731;
      color: #3fb950;
      padding: 1px 8px;
      border-radius: 3px;
      font-size: 11px;
    }

    .tag-red {
      background: #3d1a1a;
      color: #ff7b72;
    }

    /* Scratch area */
    #scratch-wrapper {
      margin: 16px 0 4px;
      position: relative;
      display: none; /* shown after typewriter ends */
      box-shadow: 0 0 0 1px #30363d;
      border-radius: 6px;
    }

    #gift-content {
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 14px;
      background: #161b22;
    }

    #scratch-canvas {
      position: absolute;
      top: 0; left: 0;
      border-radius: 6px;
      cursor: crosshair;
    }

    .scratch-hint {
      text-align: center;
      color: #8b949e;
      font-size: 11px;
      margin-top: 6px;
    }

    /* Save button (outside #birthday-card) */
    #save-btn {
      margin-top: 20px;
      display: none;
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 24px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 13px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 300ms ease;
    }

    #save-btn:hover { background: #388bfd; }

    #save-error {
      margin-top: 8px;
      color: #ff7b72;
      font-size: 12px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      display: none;
    }

    /* macOS window chrome */
    .window-chrome {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      border-radius: 8px 8px 0 0;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .traffic-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #ffbd2e; }
    .dot-green  { background: #28c840; }
    .window-title {
      color: #8b949e;
      font-size: 12px;
      margin-left: 8px;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }

    /* Card inner content padding */
    .card-content {
      padding: 20px 24px;
    }
    @media (max-width: 480px) {
      .card-content { padding: 14px 16px; }
    }

    /* Tool block */
    .tool-block {
      border: 1px solid #30363d;
      border-radius: 6px;
      margin: 4px 0;
      overflow: hidden;
    }
    .tool-header {
      background: #161b22;
      color: #8b949e;
      font-size: 11px;
      padding: 3px 10px;
      border-bottom: 1px solid #30363d;
    }
    .tool-header span { color: #58a6ff; }
    .tool-body {
      padding: 6px 10px;
      color: #3fb950;
      font-size: 12px;
    }

    /* Status bar */
    .status-bar {
      background: #161b22;
      border-top: 1px solid #30363d;
      border-radius: 0 0 8px 8px;
      padding: 6px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #8b949e;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
    }
    .status-bar .model-tag {
      color: #bc8cff;
    }
    .status-bar .key-hint {
      opacity: 0.6;
    }
  </style>
</head>

  <script>
(function () {
  // ── Content definition ──────────────────────────────────────
  const HEADER =
    '╭──────────────────────────────────────╮\n' +
    '│  claude birthday-deploy v33.0.327    │\n' +
    '│  Model: claude-powei-opus-33         │\n' +
    '╰──────────────────────────────────────╯';

  const STEPS = [
    { type: 'command', text: 'powei --age 33 --deploy birthday-surprise' },
    { type: 'spinner', label: 'Initializing birthday protocol...' },
    { type: 'tool', name: 'verify_identity',    result: 'Powei (age=33, role=chloes-exclusive-engineer)' },
    { type: 'tool', name: 'scan_preferences',   result: 'gift_list.json · 42 items found' },
    { type: 'tool', name: 'analyze_budget',     result: 'Budget OK · threshold not exceeded' },
    { type: 'tool', name: 'compatibility_check',result: 'All checks passed ✓' },
    { type: 'tool', name: 'measure_love_level', result: 'mass-production' },
  ];

  const TASK_HTML =
    '<div class="prompt-line" style="margin-top:12px;">Task: Deploy birthday surprise</div>' +
    '<div class="indent muted">Priority: <span class="tag tag-red">CRITICAL</span></div>' +
    '<div class="indent muted">Assignee: <span style="color:#e6edf3;">Chloe.C</span></div>' +
    '<div class="indent muted">Status: <span class="green">Ready to merge</span></div>';

  const GIFT_HTML =
    '<div class="prompt-line">gift.deploy({</div>' +
    '<div class="indent">item: <span class="blue">"iPhone 17e 256G 白色"</span>,</div>' +
    '<div class="indent">discount: <span class="gold">"50% OFF"</span>,</div>' +
    '<div class="indent">from: <span class="blue">"Chloe.C"</span>,</div>' +
    '<div class="indent">status: <span class="green">"approved ✓"</span></div>' +
    '<div class="prompt-line" style="margin-top:0;">})</div>';

  const FOOTER_HTML =
    '<div class="gold">🎂 Happy Birthday, Powei!</div>' +
    '<div class="indent muted">Redeemable: immediately</div>' +
    '<div class="indent muted">Expires: never</div>' +
    '<div class="indent muted" style="margin-top:4px;">— Chloe.C</div>';

  // ── Timing constants ─────────────────────────────────────────
  const CHAR_DELAY    = 40;   // ms per character
  const START_DELAY   = 300;  // ms before animation starts
  const STEP_GAP      = 400;  // ms between ✓ steps
  const SPINNER_MS    = 600;  // ms spinner runs before each ✓ step
  const SPINNER_FRAMES = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];

  // ── Helpers ──────────────────────────────────────────────────
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  async function typeText(el, text) {
    el.textContent = '';
    for (const ch of text) {
      el.textContent += ch;
      await sleep(CHAR_DELAY);
    }
  }

  async function runSpinner(containerEl, label) {
    const el = document.createElement('div');
    el.className = 'muted';
    containerEl.appendChild(el);
    const end = Date.now() + SPINNER_MS;
    let i = 0;
    while (Date.now() < end) {
      el.textContent = SPINNER_FRAMES[i % SPINNER_FRAMES.length] + ' ' + label;
      i++;
      await sleep(60);
    }
    containerEl.removeChild(el);
  }

  // ── Main sequence ────────────────────────────────────────────
  async function run() {
    await sleep(START_DELAY);

    // 1. Header box (instant — it's ASCII art, not typed)
    document.getElementById('header-box').textContent = HEADER;
    await sleep(200);

    const area = document.getElementById('typewriter-area');

    for (const step of STEPS) {
      if (step.type === 'command') {
        const line = document.createElement('div');
        line.className = 'prompt-line';
        line.style.margin = '12px 0 8px';
        area.appendChild(line);
        await typeText(line, step.text);
        await sleep(STEP_GAP);

      } else if (step.type === 'spinner') {
        await runSpinner(area, step.label);
        await sleep(100);

      } else if (step.type === 'tool') {
        const block = document.createElement('div');
        block.className = 'tool-block';
        block.innerHTML =
          '<div class="tool-header">╭─ Tool: <span>' + step.name + '</span></div>' +
          '<div class="tool-body">✓ ' + step.result + '</div>';
        area.appendChild(block);
        await sleep(STEP_GAP);
      }
    }

    // 2. Show Claude icon
    await sleep(300);
    document.getElementById('icon-row').style.display = 'block';
    await sleep(400);

    // 3. Task block
    const taskBlock = document.getElementById('task-block');
    taskBlock.style.display = 'block';
    taskBlock.innerHTML = TASK_HTML;
    await sleep(500);

    // 4. Reveal scratch card
    revealScratchArea(GIFT_HTML, FOOTER_HTML);
  }

  // expose for scratch module
  window._birthdayGiftHTML  = null;
  window._birthdayFooterHTML = null;

  function revealScratchArea(giftHTML, footerHTML) {
    window._birthdayGiftHTML   = giftHTML;
    window._birthdayFooterHTML = footerHTML;

    // Fill gift content (hidden under canvas)
    document.getElementById('gift-content').innerHTML = giftHTML;

    // Show wrapper with fade-in
    const wrapper = document.getElementById('scratch-wrapper');
    wrapper.style.display = 'block';
    wrapper.style.opacity = '0';
    wrapper.style.transition = 'opacity 300ms ease';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { wrapper.style.opacity = '1'; });
    });

    const hint = document.getElementById('scratch-hint');
    hint.style.display = 'block';

    // Init scratch canvas (Task 3)
    if (typeof window.initScratch === 'function') window.initScratch();
  }

  document.addEventListener('DOMContentLoaded', () => run().catch(console.error));
})();
  </script>

  <script>
    window.initScratch = function () {
  const canvas  = document.getElementById('scratch-canvas');
  const gift    = document.getElementById('gift-content');
  const ctx     = canvas.getContext('2d');

  // ── Sizing (devicePixelRatio aware) ─────────────────────────
  const dpr = window.devicePixelRatio || 1;
  const isTouch = window.matchMedia('(pointer: coarse)').matches;
  const BRUSH_R = (isTouch ? 36 : 28) * dpr;

  function resizeCanvas() {
    const rect = gift.getBoundingClientRect();
    canvas.style.width  = rect.width  + 'px';
    canvas.style.height = rect.height + 'px';
    canvas.width  = rect.width  * dpr;
    canvas.height = rect.height * dpr;
    drawScratchLayer();
    ctx.globalCompositeOperation = 'destination-out';
  }

  function drawScratchLayer() {
    ctx.fillStyle = '#8b949e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Hint text on scratch layer
    ctx.fillStyle = '#0d1117';
    ctx.font = `bold ${14 * dpr}px 'Courier New'`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('█████████████████████', canvas.width / 2, canvas.height / 2 - 10 * dpr);
    ctx.fillText('█████████████████████', canvas.width / 2, canvas.height / 2 + 10 * dpr);
  }

  resizeCanvas();

  // ── Scratch logic ────────────────────────────────────────────
  let isScratching = false;
  let revealed = false;

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const src  = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * dpr,
      y: (src.clientY - rect.top)  * dpr,
    };
  }

  function scratch(e) {
    if (!isScratching) return;
    if (e.touches && e.touches.length > 1) return; // ignore multi-touch
    const { x, y } = getPos(e);
    ctx.beginPath();
    ctx.arc(x, y, BRUSH_R, 0, Math.PI * 2);
    ctx.fill();
  }

  function checkReveal() {
    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
    let cleared = 0;
    const total = canvas.width * canvas.height;
    // sample every 4th pixel for performance
    for (let i = 3; i < data.length; i += 16) {
      if (data[i] < 128) cleared++;
    }
    const ratio = cleared / (total / 4);
    if (ratio >= 0.7) fullReveal();
  }

  function fullReveal() {
    if (revealed) return;
    revealed = true;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    canvas.style.pointerEvents = 'none';
    document.getElementById('scratch-hint').style.display = 'none';
    // Confetti + footer + save button (Task 4 & 5)
    if (typeof window.onGiftRevealed === 'function') window.onGiftRevealed();
  }

  // Mouse events
  canvas.addEventListener('mousedown', (e) => { isScratching = true; scratch(e); });
  canvas.addEventListener('mousemove', scratch);
  canvas.addEventListener('mouseup',   () => { isScratching = false; checkReveal(); });
  canvas.addEventListener('mouseleave', () => {
    if (isScratching) { isScratching = false; checkReveal(); }
  });

  // Touch events
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) { isScratching = true; scratch(e); }
  }, { passive: false });
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    scratch(e);
  }, { passive: false });
  canvas.addEventListener('touchend', () => {
    isScratching = false;
    checkReveal();
  });
  canvas.addEventListener('touchcancel', () => { isScratching = false; });
};
  </script>

  <script>
window.onGiftRevealed = function () {
  // 1. Confetti
  if (typeof confetti === 'function') {
    confetti({
      particleCount: 150,
      spread: 70,
      origin: { y: 0.6 },
    });
  }

  // 2. Show footer with fade-in
  const footer = document.getElementById('footer');
  footer.innerHTML = window._birthdayFooterHTML;
  footer.style.display  = 'block';
  footer.style.opacity  = '0';
  footer.style.transition = 'opacity 300ms ease';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { footer.style.opacity = '1'; });
  });

  // 3. Show save button (Task 5 wires this up)
  if (typeof window.showSaveButton === 'function') window.showSaveButton();
};
  </script>

  <script>
window.showSaveButton = function () {
  const btn = document.getElementById('save-btn');
  btn.style.display = 'block';
  requestAnimationFrame(() => {
    requestAnimationFrame(() => { btn.style.opacity = '1'; });
  });

  btn.addEventListener('click', async () => {
    btn.textContent = '⏳ Generating...';
    btn.disabled = true;
    try {
      const card = document.getElementById('birthday-card');
      const canvas = await html2canvas(card, {
        backgroundColor: '#0d1117',
        scale: window.devicePixelRatio || 2,
        useCORS: true,
        logging: false,
      });
      const link = document.createElement('a');
      link.download = 'happy-birthday-powei.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      btn.textContent = '✓ Saved!';
    } catch (err) {
      const errEl = document.getElementById('save-error');
      errEl.textContent = '截圖失敗 — 請手動截圖儲存 📸';
      errEl.style.display = 'block';
      btn.textContent = '💾 Save as Image';
      btn.disabled = false;
    }
  });
};
  </script>
